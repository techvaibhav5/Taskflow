<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — Dashboard</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">TF</span>
      <span class="brand-name">TaskFlow</span>
    </div>
    <div class="topbar-right">
      <span id="userLabel"></span>
      <button id="logoutBtn" class="btn-ghost">Log out</button>
    </div>
  </header>

  <main class="dash">
    <section class="dash-header">
      <h1>Your tasks</h1>
      <button id="newTaskBtn" class="btn-primary">+ New task</button>
    </section>

    <section class="filters">
      <button class="filter-chip active" data-status="ALL">All</button>
      <button class="filter-chip" data-status="TODO">To do</button>
      <button class="filter-chip" data-status="IN_PROGRESS">In progress</button>
      <button class="filter-chip" data-status="DONE">Done</button>
    </section>

    <section id="taskList" class="task-list">
      <p class="empty-state">Loading tasks…</p>
    </section>
  </main>

  <!-- Modal for create/edit -->
  <div id="taskModal" class="modal hidden">
    <div class="modal-card">
      <h2 id="modalTitle">New task</h2>
      <form id="taskForm">
        <input type="hidden" id="taskId">
        <label>Title
          <input type="text" id="taskTitleInput" required>
        </label>
        <label>Description
          <textarea id="taskDescInput" rows="3"></textarea>
        </label>
        <div class="form-row">
          <label>Status
            <select id="taskStatusInput">
              <option value="TODO">To do</option>
              <option value="IN_PROGRESS">In progress</option>
              <option value="DONE">Done</option>
            </select>
          </label>
          <label>Priority
            <select id="taskPriorityInput">
              <option value="LOW">Low</option>
              <option value="MEDIUM" selected>Medium</option>
              <option value="HIGH">High</option>
            </select>
          </label>
        </div>
        <label>Due date
          <input type="date" id="taskDueDateInput">
        </label>
        <div class="modal-actions">
          <button type="button" id="cancelModalBtn" class="btn-ghost">Cancel</button>
          <button type="submit" class="btn-primary">Save task</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
