spring.application.name=taskflow

# DB config - reads from environment variables in production, falls back to local defaults
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/taskflow_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

server.port=${PORT:8080}

jwt.secret=${JWT_SECRET:ThisIsADevOnlySecretKeyChangeInProduction1234567890}
jwt.expiration.ms=86400000

# CORS - your deployed frontend URL goes here, comma separated if multiple
app.cors.allowed-origins=${CORS_ORIGINS:*}
