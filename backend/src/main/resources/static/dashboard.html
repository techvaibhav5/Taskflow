<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="app-header">
    <div class="brand-mark"><span class="led led--in-progress"></span> TaskFlow</div>
    <div class="header-right">
      <span class="role-chip" id="role-chip">USER</span>
      <div class="user-chip">
        <div class="avatar" id="user-avatar">--</div>
        <span id="username-label"></span>
      </div>
      <button class="btn btn-ghost" id="logout-btn">Sign out</button>
    </div>
  </header>

  <div class="toolbar">
    <div>
      <h1>Your board</h1>
      <div class="subtitle" id="board-subtitle">loading...</div>
    </div>
    <div style="display:flex; gap:12px; align-items:center;">
      <div class="filter-row" id="filter-row">
        <button class="chip-toggle active" data-filter="all">All</button>
        <button class="chip-toggle" data-filter="mine">Created by me</button>
        <button class="chip-toggle" data-filter="assigned">Assigned to me</button>
      </div>
      <button class="btn btn-primary" id="new-task-btn">+ New task</button>
    </div>
  </div>

  <main class="board" id="board">
    <section class="column" data-status="TODO">
      <div class="column-header">
        <span class="led led--todo"></span>
        <h3>To do</h3>
        <span class="column-count" id="count-TODO">0</span>
      </div>
      <div class="column-drop" data-status="TODO" id="drop-TODO"></div>
    </section>

    <section class="column" data-status="IN_PROGRESS">
      <div class="column-header">
        <span class="led led--in-progress"></span>
        <h3>In progress</h3>
        <span class="column-count" id="count-IN_PROGRESS">0</span>
      </div>
      <div class="column-drop" data-status="IN_PROGRESS" id="drop-IN_PROGRESS"></div>
    </section>

    <section class="column" data-status="DONE">
      <div class="column-header">
        <span class="led led--done"></span>
        <h3>Done</h3>
        <span class="column-count" id="count-DONE">0</span>
      </div>
      <div class="column-drop" data-status="DONE" id="drop-DONE"></div>
    </section>
  </main>

  <!-- Create / Edit task modal -->
  <div class="modal-backdrop" id="task-modal-backdrop">
    <div class="modal">
      <h2 id="modal-title">New task</h2>
      <div id="modal-error" class="error-banner"></div>
      <form id="task-form">
        <input type="hidden" id="task-id" />
        <div class="field">
          <label for="task-title">Title</label>
          <input id="task-title" required maxlength="150" />
        </div>
        <div class="field">
          <label for="task-description">Description</label>
          <textarea id="task-description" maxlength="2000"></textarea>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="task-priority">Priority</label>
            <select id="task-priority">
              <option value="LOW">Low</option>
              <option value="MEDIUM" selected>Medium</option>
              <option value="HIGH">High</option>
            </select>
          </div>
          <div class="field">
            <label for="task-status">Status</label>
            <select id="task-status">
              <option value="TODO">To do</option>
              <option value="IN_PROGRESS">In progress</option>
              <option value="DONE">Done</option>
            </select>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="task-due-date">Due date</label>
            <input id="task-due-date" type="date" />
          </div>
          <div class="field">
            <label for="task-assignee">Assign to</label>
            <select id="task-assignee">
              <option value="">Unassigned</option>
            </select>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="modal-cancel-btn">Cancel</button>
          <button type="submit" class="btn btn-primary" id="modal-save-btn">Save task</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
