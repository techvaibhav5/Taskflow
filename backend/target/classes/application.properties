spring.application.name=taskmanager

# --- Database ---
# These default to local values for development, but on Render/production
# the actual values come from environment variables (see Dockerfile / Render dashboard).
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/taskmanager_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# --- JWT ---
# app.jwt.secret MUST be a Base64-encoded string, at least 256 bits (32 bytes) once decoded.
# A safe default is provided for local dev only - always override this with JWT_SECRET in production.
app.jwt.secret=${JWT_SECRET:c2VjcmV0a2V5Zm9ydGFza21hbmFnZXJhcHBsaWNhdGlvbjI1NmJpdHNsb25nZW5vdWdo}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# --- Server ---
server.port=${PORT:8080}

# --- Misc ---
spring.jackson.serialization.write-dates-as-timestamps=false
